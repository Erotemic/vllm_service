name: single-node-kubeai
backend: kubeai
active_profile: qwen-single-node
catalog:
  builtin_models: false
  builtin_profiles: false
  user_models_file: models.yaml
policy:
  require_fit_validation: true
  reserve_display_gpu: auto
  forbid_reserved_gpu_use: false
  require_homogeneous_multi_gpu_groups: true
  minimum_vram_headroom_gib: 4
  allow_unsupported_render: false
runtime:
  compose_cmd: docker compose
  target_inventory: auto
ports:
  litellm: 14000
  open_webui: 13000
  postgres: 15432
state:
  hf_cache: ./state/hf-cache
  open_webui: ./state/open-webui
  postgres: ./state/postgres
  runtime: ./state/runtime
cluster:
  namespace: kubeai
  kubeai_release_name: kubeai
  kubeai_chart: kubeai/kubeai
  service_name: kubeai
  ingress:
    enabled: true
    class_name: traefik
    host: llm.local
    path_prefix: /
    tls_secret_name: ""
resource_profiles:
  blackwell-96gb:
    node_selector:
      kubernetes.io/hostname: CHANGE-ME
    requests:
      nvidia.com/gpu: "1"
      cpu: "6"
      memory: 24Gi
    limits:
      nvidia.com/gpu: "1"
      cpu: "6"
      memory: 24Gi
profiles:
  qwen-single-node:
    description: Run one small Qwen model and one larger Qwen model on a single multi-GPU box.
    services:
      - service_name: qwen-small
        model: qwen-small
        resource_profile: blackwell-96gb:1
        placement:
          strategy: first_fit
          gpu_count: 1
        topology:
          tensor_parallel_size: 1
        min_replicas: 0
        max_replicas: 1
      - service_name: qwen-large
        model: qwen-large
        resource_profile: blackwell-96gb:4
        placement:
          strategy: first_fit
          gpu_count: 4
        topology:
          tensor_parallel_size: 4
        min_replicas: 0
        max_replicas: 1
