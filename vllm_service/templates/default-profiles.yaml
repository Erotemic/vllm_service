  # ── HELM evaluation profiles ──────────────────────────────────────────────
  # One profile per HELM model. Switch to the target model, run evals, switch
  # back. The served_model_name in each service matches the HELM side tag
  # exactly so HELM can route without extra configuration.
  # 72B models use tp=2; all others fit on a single 96GB GPU.

  helm-qwen2-72b-instruct:
    description: "HELM: qwen/qwen2-72b-instruct (Qwen/Qwen2-72B-Instruct, tp=2)"
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: helm-main
        model: qwen2-72b-instruct
        placement:
          strategy: first_fit
          gpu_count: 2
        topology:
