      allow_unsupported_render: false


  gemma4-31b-max-context:
    description: "Maximize context window for Gemma 4 31B on a 4x96GB server. Sacrifices concurrency and co-hosting."
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: gemma-main
        model: gemma4-31b
        served_model_name: gemma4-31b
        placement:
          strategy: multi_gpu
          gpu_indices: [0, 1, 2, 3]
          prefer_homogeneous_group: true
        topology:
          tp: 4
          dp: 1
        runtime:
          max_model_len: 262144
          gpu_memory_utilization: 0.95
          max_num_seqs: 1
          max_num_batched_tokens: 4096
          enable_prefix_caching: true
          enable_chunked_prefill: true
          reasoning_history_policy: final_only

    router:
      aliases:
        gemma4-31b: gemma-main

    policy:
      require_fit_validation: true
      minimum_vram_headroom_gib: 4
      allow_unsupported_render: false

