profiles:
  workstation-safe:
    description: Single model on the first non-display GPU.
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: chat
        model: qwen3.5-9b
        placement:
          strategy: first_fit
          gpu_count: 1
    router:
      aliases:
        qwen3.5-9b: chat
  qwen-mixed:
    description: Multiple Qwen models behind LiteLLM.
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: qwen-27b
        model: qwen3.5-27b
        placement:
          strategy: first_fit
          gpu_count: 1
      - service_name: qwen-2b
        model: qwen3.5-2b
        placement:
          strategy: first_fit
          gpu_count: 1
      - service_name: qwen-122b
        model: qwen3.5-122b-a10b
        placement:
          strategy: first_fit
          gpu_count: 2
        topology:
          tensor_parallel_size: 2
    router:
      aliases:
        qwen3.5-27b: qwen-27b
        qwen3.5-2b: qwen-2b
        qwen3.5-122b: qwen-122b
  gemma-mixed:
    description: Mix small and medium Gemma 4 models behind LiteLLM.
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: gemma-e4b
        model: gemma4-e4b
        placement:
          strategy: first_fit
          gpu_count: 1
      - service_name: gemma-31b
        model: gemma4-31b
        placement:
          strategy: first_fit
          gpu_count: 1
      - service_name: gemma-26b
        model: gemma4-26b
        placement:
          strategy: first_fit
          gpu_count: 1
    router:
      aliases:
        gemma4-e4b: gemma-e4b
        gemma4-31b: gemma-31b
        gemma4-26b: gemma-26b


  gemma4-26b-workstation:
    description: "Efficient default for agentic coding and general chat on a 4x96GB server."
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - name: gemma-main
        model: gemma4-26b
        served_model_name: gemma4-26b
        placement:
          strategy: single_gpu
          gpu_indices: [0]
          prefer_homogeneous_group: true
        topology:
          tp: 1
          dp: 1
        runtime:
          max_model_len: 32768
          gpu_memory_utilization: 0.9
          max_num_seqs: 8
          max_num_batched_tokens: 8192
          enable_prefix_caching: true
          enable_chunked_prefill: true
          reasoning_history_policy: final_only

    router:
      aliases:
        gemma4-26b: gemma-main

    policy:
      require_fit_validation: true
      minimum_vram_headroom_gib: 8
      allow_unsupported_render: false

  gemma4-31b-quality:
    description: "Higher-quality Gemma 4 profile for coding/reasoning on a 4x96GB server."
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: gemma-main
        model: gemma4-31b
        served_model_name: gemma4-31b
        placement:
          strategy: single_gpu
          gpu_indices: [0]
          prefer_homogeneous_group: true
        topology:
          tp: 1
          dp: 1
        runtime:
          max_model_len: 32768
          gpu_memory_utilization: 0.9
